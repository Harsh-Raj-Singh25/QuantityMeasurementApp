spring.application.name=quantity-measurement-app
# Railway provides the PORT, default to 8080 for local
server.port=${PORT:8080}

# --- Database Configuration ---
# These variables come from Railway Environment Variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Since we are using Neon (PostgreSQL)
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Security & JWT ---
# Make sure to add these to Railway Variables too!
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

jwt.secret=${JWT_SECRET:QuantityMeasurementAppSuperSecretKeyThatIsVeryLongAndSecure123!}
jwt.expirationMs=86400000

# --- Documentation ---
springdoc.swagger-ui.path=/swagger-ui.html