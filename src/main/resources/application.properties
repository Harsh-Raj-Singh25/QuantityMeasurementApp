# Database Configuration
db.url=jdbc:h2:mem:quantitydb;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:db/schema.sql'
db.user=sa
db.password=
db.driver=org.h2.Driver

# Connection Pool Settings
pool.initialSize=5
pool.maxSize=20

# Repository Switch (Options: database | cache)
repository.type=database